<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Grátis - Ativar Agora</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 50px 35px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d67a4d 0%, #417484 50%, #3a7487 100%);
        }

        /* PÁGINA 1 - INTERNET GRÁTIS */
        .page-1 .wifi-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 25px;
            position: relative;
        }

        .wifi-icon svg {
            width: 100%;
            height: 100%;
        }

        .page-1 h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: #3a7487;
            line-height: 1.2;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .page-1 h1 span {
            color: #d67a4d;
            display: block;
            font-size: 2rem;
        }

        .page-1 p {
            color: #666;
            font-size: 1.05rem;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 18px 30px;
            border: none;
            border-radius: 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #417484 0%, #3a7487 100%);
            box-shadow: 0 8px 25px rgba(58, 116, 135, 0.35);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(58, 116, 135, 0.45);
        }

        .btn-donate {
            background: linear-gradient(135deg, #d67a4d 0%, #de8347 50%, #e8a040 100%);
            box-shadow: 0 8px 25px rgba(214, 122, 77, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-donate:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(214, 122, 77, 0.45);
        }

        .btn-donate svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* PÁGINA 2 - REVELAÇÃO */
        .page-2 {
            display: none;
        }

        .page-2 .emoji-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #417484 0%, #3a7487 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .emoji-icon::before,
        .emoji-icon::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 20px;
            background: #d67a4d;
            border-radius: 4px;
            top: -8px;
        }

        .emoji-icon::before {
            left: 28px;
            transform: rotate(-25deg);
        }

        .emoji-icon::after {
            right: 28px;
            transform: rotate(25deg);
            background: #e8a040;
        }

        .emoji-icon .face {
            font-size: 3.5rem;
            color: white;
        }

        .page-2 h2 {
            font-size: 1.9rem;
            font-weight: 800;
            color: #3a7487;
            line-height: 1.25;
            margin-bottom: 8px;
        }

        .page-2 h2 span {
            color: #d67a4d;
        }

        .page-2 .subtitle {
            color: #555;
            font-size: 1rem;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .divider .line {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider .heart {
            color: #d67a4d;
            font-size: 1.3rem;
        }

        .page-2 .cta-text {
            color: #444;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .page-2 .cta-bold {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 30px;
        }

        .page-2 .cta-bold span {
            color: #3a7487;
        }

        /* LOGO ALMOÇO SOLIDÁRIO */
        .logo-solidario {
            margin-bottom: 30px;
        }

        .logo-solidario .tag {
            display: inline-block;
            background: linear-gradient(135deg, #d67a4d 0%, #e8a040 100%);
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 6px 18px;
            border-radius: 6px 6px 0 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-solidario .name {
            font-size: 2.2rem;
            font-weight: 800;
            color: #222;
            line-height: 1;
            letter-spacing: -1px;
        }

        /* Animações */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .animate-in {
            animation: fadeIn 0.6s ease forwards;
        }

        .pulse {
            animation: pulse 2s ease infinite;
        }

        /* Responsivo */
        @media (max-width: 480px) {
            .card {
                padding: 40px 25px;
                border-radius: 20px;
            }
            .page-1 h1 {
                font-size: 1.8rem;
            }
            .page-1 h1 span {
                font-size: 1.7rem;
            }
            .page-2 h2 {
                font-size: 1.6rem;
            }
            .btn {
                font-size: 1rem;
                padding: 16px 25px;
            }
        }

        /* Loading spinner para simulação */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top-color: #417484;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #666;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- LOADING -->
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">A ativar internet grátis...</div>
    </div>

    <div class="container">
        <!-- PÁGINA 1: INTERNET GRÁTIS -->
        <div class="card page-1" id="page1">
            <div class="wifi-icon">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 20C30 20 12 30 2 45" stroke="#417484" stroke-width="6" stroke-linecap="round"/>
                    <path d="M50 35C36 35 24 42 17 52" stroke="#417484" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
                    <path d="M50 50C42 50 35 55 31 61" stroke="#417484" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
                    <circle cx="50" cy="68" r="8" fill="#417484" opacity="0.4"/>
                </svg>
            </div>

            <h1>INTERNET GRÁTIS <span>DISPONÍVEL!</span></h1>
            <p>Clique abaixo para ativar agora.</p>

            <button class="btn btn-primary" onclick="ativarInternet()">
                ACESSAR
            </button>
        </div>

        <!-- PÁGINA 2: REVELAÇÃO SOLIDÁRIA -->
        <div class="card page-2" id="page2">
            <div class="logo-solidario animate-in">
                <div class="tag">Almoço</div>
                <div class="name">Solidário</div>
            </div>

            <div class="emoji-icon animate-in" style="animation-delay: 0.1s">
                <div class="face">😉</div>
            </div>

            <h2 class="animate-in" style="animation-delay: 0.2s">
                NÃO FOI DESSA VEZ,<br><span>CAMPEÃO...</span>
            </h2>

            <p class="subtitle animate-in" style="animation-delay: 0.3s">
                Isso foi só para chamar a sua atenção.
            </p>

            <div class="divider animate-in" style="animation-delay: 0.4s">
                <div class="line"></div>
                <div class="heart">❤</div>
                <div class="line"></div>
            </div>

            <p class="cta-text animate-in" style="animation-delay: 0.5s">
                Agora que estás aqui...
            </p>
            <p class="cta-bold animate-in" style="animation-delay: 0.6s">
                Que tal <span>ajudares</span> nessa causa?
            </p>

            <a href="https://wa.me/258876666053?text=Quero%20doar" class="btn btn-donate animate-in pulse" style="animation-delay: 0.7s" target="_blank">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                QUERO DOAR
            </a>
        </div>
    </div>

    <script>
        function ativarInternet() {
            const loading = document.getElementById('loading');
            const page1 = document.getElementById('page1');
            const page2 = document.getElementById('page2');

            // Mostrar loading
            loading.classList.add('active');

            // Simular processamento
            setTimeout(() => {
                loading.classList.remove('active');

                // Esconder página 1 e mostrar página 2
                page1.style.display = 'none';
                page2.style.display = 'block';

                // Scroll para topo
                window.scrollTo(0, 0);
            }, 2000);
        }
    </script>

</body>
</html>
